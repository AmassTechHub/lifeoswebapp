<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Outer ring arc — represents orbit/system -->
  <circle cx="16" cy="16" r="11" stroke="#1e3a5f" stroke-width="1" fill="none" opacity="0.6"/>

  <!-- "L" mark — vertical bar -->
  <rect x="9" y="8" width="3.5" height="13" rx="1.5" fill="#818cf8"/>
  <!-- "L" mark — horizontal bar -->
  <rect x="9" y="17.5" width="11" height="3.5" rx="1.5" fill="#818cf8"/>

  <!-- AI node — glowing blue dot top-right -->
  <circle cx="23" cy="9" r="5" fill="url(#glow)"/>
  <circle cx="23" cy="9" r="3.2" fill="#2563eb"/>
  <circle cx="23" cy="9" r="1.5" fill="#93c5fd"/>

  <!-- Connector line from L to AI node -->
  <line x1="19" y1="9" x2="20" y2="9" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
</svg>
